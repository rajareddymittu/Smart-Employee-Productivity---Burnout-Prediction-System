<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employee Productivity - Prototype UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>AI Employee Productivity Prototype</h1>
        <nav>
          <button id="nav-login">Login</button>
          <button id="nav-dashboard">Dashboard</button>
          <button id="nav-employees">Employees</button>
          <button id="nav-predict">Predict</button>
        </nav>
      </header>

      <main>
        <section id="page-login" class="page">
          <h2>Login</h2>
          <form id="login-form">
            <label>Username <input id="login-username" required /></label>
            <label>Password <input id="login-password" type="password" required /></label>
            <button type="submit">Login</button>
          </form>
          <div id="login-message" class="message"></div>
        </section>

        <section id="page-dashboard" class="page hidden">
          <h2>Dashboard</h2>
          <div id="dashboard-content">Loading...</div>
        </section>

        <section id="page-employees" class="page hidden">
          <h2>Employees</h2>
          <button id="refresh-employees">Refresh</button>
          <ul id="employees-list"></ul>
        </section>

        <section id="page-predict" class="page hidden">
          <h2>Predict Burnout</h2>
          <form id="predict-form">
            <label>Employee ID <input id="p-employee-id" type="number" required /></label>
            <label>Working hours/day <input id="p-working-hours" type="number" step="0.1" value="8" required /></label>
            <label>Overtime hours <input id="p-overtime" type="number" step="0.1" value="0" required /></label>
            <label>Meeting hours <input id="p-meetings" type="number" step="0.1" value="1" required /></label>
            <label>Leave count <input id="p-leave-count" type="number" value="0" required /></label>
            <label>Late arrivals <input id="p-late" type="number" value="0" required /></label>
            <label>Task completion % <input id="p-task-complete" type="number" value="80" required /></label>
            <label>Performance rating <input id="p-rating" type="number" step="0.1" value="3.5" required /></label>
            <button type="submit">Predict</button>
          </form>
          <div id="predict-result" class="message"></div>
        </section>
      </main>

      <footer>
        <small>Prototype UI — connects to backend at <span id="api-base"></span></small>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
